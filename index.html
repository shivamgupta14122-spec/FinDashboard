<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #0f2040;
  --navy3: #162d55;
  --navy4: #1e3a6e;
  --gold: #f4c430;
  --gold2: #d4a820;
  --gold3: rgba(244,196,48,0.15);
  --green: #27ae60;
  --green2: rgba(39,174,96,0.15);
  --red: #e74c3c;
  --red2: rgba(231,76,60,0.15);
  --blue: #2980b9;
  --blue2: rgba(41,128,185,0.15);
  --text: #e8edf5;
  --text2: #8fa3bf;
  --border: rgba(244,196,48,0.2);
  --card: rgba(15,32,64,0.9);
  --radius: 14px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 20%, rgba(244,196,48,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(41,128,185,0.04) 0%, transparent 50%);
}

/* ─── TOP HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--navy2), var(--navy3));
  border-bottom: 1px solid var(--border);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.header-title span { color: var(--text2); font-size: 0.9rem; font-family: 'DM Sans', sans-serif; display: block; }

/* ─── YEAR TABS ─── */
.year-nav {
  background: var(--navy2);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 32px;
  gap: 4px;
  overflow-x: auto;
}
.year-nav::-webkit-scrollbar { height: 3px; }
.year-nav::-webkit-scrollbar-track { background: var(--navy2); }
.year-nav::-webkit-scrollbar-thumb { background: var(--gold2); border-radius: 2px; }
.year-tab {
  padding: 14px 28px;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  color: var(--text2);
  border-bottom: 3px solid transparent;
  transition: all 0.25s;
  white-space: nowrap;
}
.year-tab:hover { color: var(--gold); }
.year-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ─── MONTH TABS ─── */
.month-nav {
  background: var(--navy3);
  display: flex;
  padding: 0 32px;
  gap: 2px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
}
.month-nav::-webkit-scrollbar { height: 3px; }
.month-nav::-webkit-scrollbar-thumb { background: var(--navy4); border-radius: 2px; }
.month-tab {
  padding: 11px 18px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.month-tab:hover { color: var(--text); }
.month-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(244,196,48,0.05); }

/* ─── MAIN CONTENT ─── */
.content { padding: 32px; max-width: 1400px; margin: 0 auto; }

/* ─── CARDS ─── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-title .icon { font-size: 1.1rem; }

/* ─── INPUT ROWS ─── */
.input-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}
.input-row label { color: var(--text2); font-size: 0.9rem; font-weight: 500; }
.input-row input {
  background: var(--navy3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s;
  width: 100%;
  max-width: 320px;
}
.input-row input:focus { outline: none; border-color: var(--gold); }
.input-row input::placeholder { color: var(--text2); }

/* ─── TOTAL BOXES ─── */
.total-box {
  border-radius: 10px;
  padding: 16px 24px;
  margin-top: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 1.05rem;
}
.total-box.green { background: var(--green2); border: 1px solid var(--green); color: var(--green); }
.total-box.red { background: var(--red2); border: 1px solid var(--red); color: var(--red); }
.total-box.blue { background: var(--blue2); border: 1px solid var(--blue); color: var(--blue); }
.total-box.gold { background: var(--gold3); border: 1px solid var(--gold); color: var(--gold); }
.total-box .amount { font-size: 1.3rem; font-family: 'Playfair Display', serif; }

/* ─── INVESTMENT TABLE ─── */
.inv-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
.inv-table th {
  background: var(--navy3);
  padding: 12px 10px;
  text-align: left;
  color: var(--gold);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
  white-space: nowrap;
}
.inv-table td {
  padding: 10px;
  border-bottom: 1px solid rgba(244,196,48,0.08);
  color: var(--text);
  vertical-align: middle;
}
.inv-table tr:hover td { background: rgba(244,196,48,0.03); }
.inv-table td.asset-name { color: var(--text2); font-weight: 500; white-space: nowrap; }
.inv-table td input {
  background: var(--navy3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  color: var(--text);
  font-size: 0.88rem;
  width: 130px;
  font-family: 'DM Sans', sans-serif;
}
.inv-table td input:focus { outline: none; border-color: var(--gold); }
.inv-table td.computed { color: var(--text2); font-weight: 500; }
.inv-table td.gain-pos { color: var(--green); font-weight: 600; }
.inv-table td.gain-neg { color: var(--red); font-weight: 600; }
.inv-table tfoot td {
  background: var(--navy3);
  font-weight: 700;
  color: var(--gold);
  border-top: 2px solid var(--border);
  font-size: 0.92rem;
}

/* ─── CHARTS ROW ─── */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 24px;
}
@media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
}
.chart-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.chart-wrap { position: relative; height: 260px; }

/* ─── SUMMARY TAB ─── */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 900px) { .summary-grid { grid-template-columns: 1fr; } }
.profile-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 24px;
  grid-column: 1 / -1;
}
.profile-pic-wrap {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
  background: var(--navy3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  transition: border-color 0.2s;
  position: relative;
}
.profile-pic-wrap:hover { border-color: var(--gold2); }
.profile-pic-wrap img { width: 100%; height: 100%; object-fit: cover; }
.profile-info { flex: 1; }
.profile-info input, .profile-info textarea {
  background: var(--navy3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  width: 100%;
  margin-bottom: 10px;
}
.profile-info input { font-size: 1.1rem; font-weight: 600; }
.profile-info input:focus, .profile-info textarea:focus { outline: none; border-color: var(--gold); }
.profile-info textarea { resize: none; height: 60px; font-size: 0.88rem; }

/* ─── GOALS BOX ─── */
.goals-box textarea {
  width: 100%;
  background: var(--navy3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  height: 140px;
  resize: vertical;
  line-height: 1.6;
}
.goals-box textarea:focus { outline: none; border-color: var(--gold); }

/* ─── VISION BOARD ─── */
.vision-board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-top: 12px;
}
@media (max-width: 700px) { .vision-board { grid-template-columns: repeat(3, 1fr); } }
.vision-cell {
  aspect-ratio: 1;
  border-radius: 10px;
  border: 2px dashed var(--border);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--navy3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, transform 0.2s;
}
.vision-cell:hover { border-color: var(--gold); transform: scale(1.03); }
.vision-cell img { width: 100%; height: 100%; object-fit: cover; }
.vision-cell .add-icon { font-size: 1.8rem; color: var(--text2); pointer-events: none; }
.vision-cell .remove-btn {
  position: absolute;
  top: 6px; right: 6px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 24px; height: 24px;
  cursor: pointer;
  font-size: 14px;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.vision-cell:hover .remove-btn { display: flex; }

/* ─── SAVINGS HERO ─── */
.savings-hero {
  background: linear-gradient(135deg, rgba(244,196,48,0.1), rgba(41,128,185,0.1));
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  margin-bottom: 24px;
}
.savings-hero .label { color: var(--text2); font-size: 0.9rem; margin-bottom: 8px; }
.savings-hero .amount {
  font-family: 'Playfair Display', serif;
  font-size: 2.8rem;
  color: var(--gold);
  font-weight: 700;
}
.savings-hero .formula { color: var(--text2); font-size: 0.82rem; margin-top: 10px; }

/* ─── FULL CHART CARD ─── */
.chart-card-full {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  grid-column: 1 / -1;
}
.chart-card-full h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.chart-wrap-full { position: relative; height: 280px; }

/* ─── SECTION DIVIDER ─── */
.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text2);
  margin-bottom: 6px;
  margin-top: 4px;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--navy4); border-radius: 3px; }

/* ─── TABLE OVERFLOW ─── */
.table-wrap { overflow-x: auto; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .content { padding: 16px; }
  .header { padding: 14px 16px; }
  .year-nav, .month-nav { padding: 0 16px; }
  .input-row { grid-template-columns: 150px 1fr; }
  .input-row input { max-width: 100%; }
  .profile-section { flex-direction: column; text-align: center; }
}

/* ─── FADE IN ─── */
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── EXPORT BTN ─── */
.export-btn {
  background: var(--gold3);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  transition: background 0.2s;
  float: right;
}
.export-btn:hover { background: rgba(244,196,48,0.25); }

/* ─── PRINT ─── */
@media print {
  .header, .year-nav, .month-nav, .export-btn { display: none !important; }
  .content { padding: 0; }
  body { background: #fff; color: #000; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">💰 FinDash Pro <span>Personal Finance Dashboard</span></div>
  </div>
  <div style="color:var(--text2);font-size:0.85rem;" id="header-date"></div>
</div>

<div class="year-nav" id="yearNav"></div>
<div class="month-nav" id="monthNav"></div>
<div class="content" id="mainContent"></div>

<input type="file" id="profilePicInput" accept="image/*" style="display:none">
<input type="file" id="visionInput" accept="image/*" style="display:none">

<script>
// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const YEARS = [2026,2027,2028,2029,2030];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MSHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const INCOME_FIELDS = [
  {key:'salary', label:'Salary'},
  {key:'interest', label:'Interest Income'},
  {key:'misc_inc', label:'Miscellaneous Income'}
];

const EXPENSE_FIELDS = [
  {key:'rent', label:'Rent'},
  {key:'electricity', label:'Electricity'},
  {key:'wifi', label:'WiFi'},
  {key:'groceries', label:'Groceries'},
  {key:'travel', label:'Travel'},
  {key:'shopping', label:'Shopping'},
  {key:'toiletries', label:'Toiletries'},
  {key:'leisure', label:'Leisure'},
  {key:'phonebills', label:'Phone Bills'},
  {key:'subscriptions', label:'Subscriptions'},
  {key:'misc_exp', label:'Miscellaneous Expenses'},
  {key:'loan_emi', label:'Loan EMIs'},
  {key:'credit_card', label:'Credit Card Bills'}
];

const INV_ASSETS = [
  {key:'mf', label:'Mutual Funds'},
  {key:'commodities', label:'Commodities'},
  {key:'equities', label:'Equities'},
  {key:'debt', label:'Debt Funds'},
  {key:'nfc', label:'NFCs'},
  {key:'p2p', label:'P2P Lending'}
];

const INV_COLORS = ['#f4c430','#2980b9','#27ae60','#e74c3c','#9b59b6','#1abc9c'];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let activeYear = YEARS[0];
let activeMonth = 'summary'; // 'summary' or 0-11
let charts = {};
let visionSlot = 0;

// ══════════════════════════════════════════
//  STORAGE HELPERS
// ══════════════════════════════════════════
function sk(year, month, field) {
  return `fd_${year}_${month}_${field}`;
}
function save(key, val) { try { localStorage.setItem(key, val); } catch(e){} }
function load(key, def='') { return localStorage.getItem(key) ?? def; }

function getVal(year, month, field) {
  return parseFloat(load(sk(year, month, field), '0')) || 0;
}

// ══════════════════════════════════════════
//  FORMAT
// ══════════════════════════════════════════
function fmt(n) {
  if(isNaN(n)) n=0;
  return '₹' + Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtSigned(n) {
  const s = n >= 0 ? '+' : '-';
  return s + fmt(n);
}

// ══════════════════════════════════════════
//  BUILD YEAR / MONTH NAV
// ══════════════════════════════════════════
function buildNav() {
  const yn = document.getElementById('yearNav');
  yn.innerHTML = '';
  YEARS.forEach(y => {
    const d = document.createElement('div');
    d.className = 'year-tab' + (y===activeYear?' active':'');
    d.textContent = y;
    d.onclick = () => { activeYear=y; activeMonth='summary'; buildNav(); renderContent(); };
    yn.appendChild(d);
  });

  const mn = document.getElementById('monthNav');
  mn.innerHTML = '';
  // Summary tab
  const st = document.createElement('div');
  st.className='month-tab'+(activeMonth==='summary'?' active':'');
  st.textContent='📊 Summary';
  st.onclick=()=>{activeMonth='summary';buildNav();renderContent();};
  mn.appendChild(st);
  MONTHS.forEach((m,i)=>{
    const d=document.createElement('div');
    d.className='month-tab'+(activeMonth===i?' active':'');
    d.textContent=MSHORT[i];
    d.onclick=()=>{activeMonth=i;buildNav();renderContent();};
    mn.appendChild(d);
  });
}

// ══════════════════════════════════════════
//  RENDER CONTENT ROUTER
// ══════════════════════════════════════════
function renderContent() {
  // Destroy old charts
  Object.values(charts).forEach(c=>{ try{c.destroy();}catch(e){} });
  charts = {};
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  mc.className = 'content fade-in';
  if(activeMonth==='summary') renderSummary();
  else renderMonth(activeMonth);
}

// ══════════════════════════════════════════
//  INCOME CALCULATION
// ══════════════════════════════════════════
function calcIncome(year, mi) {
  return INCOME_FIELDS.reduce((s,f)=>s+getVal(year,mi,f.key),0);
}

// ══════════════════════════════════════════
//  EXPENSES CALCULATION
// ══════════════════════════════════════════
function calcExpenses(year, mi) {
  return EXPENSE_FIELDS.reduce((s,f)=>s+getVal(year,mi,f.key),0);
}

// ══════════════════════════════════════════
//  INVESTMENT CALCULATION (cumulative)
// ══════════════════════════════════════════
function calcInvCumulative(year, upToMonth, assetKey) {
  let totalInv=0, totalMV=0;
  for(let m=0; m<=upToMonth; m++){
    totalInv += getVal(year, m, `inv_${assetKey}_amount`);
    totalMV  += getVal(year, m, `inv_${assetKey}_mv`);
  }
  return {totalInv, totalMV};
}

function calcMonthInvTotal(year, mi) {
  let totalInv=0, totalMV=0;
  INV_ASSETS.forEach(a=>{
    const c=calcInvCumulative(year,mi,a.key);
    totalInv+=c.totalInv;
    totalMV+=c.totalMV;
  });
  return {totalInv, totalMV};
}

function calcMonthInvAmount(year, mi) {
  return INV_ASSETS.reduce((s,a)=>s+getVal(year,mi,`inv_${a.key}_amount`),0);
}

// ══════════════════════════════════════════
//  RENDER MONTH TAB
// ══════════════════════════════════════════
function renderMonth(mi) {
  const mc = document.getElementById('mainContent');
  const monthName = MONTHS[mi];

  // Export button
  const expBtn = document.createElement('button');
  expBtn.className='export-btn';
  expBtn.textContent='🖨 Export Month';
  expBtn.onclick=()=>exportMonth(mi);
  mc.appendChild(expBtn);

  const heading = document.createElement('div');
  heading.style.cssText='font-family:"Playfair Display",serif;font-size:1.5rem;color:var(--text2);margin-bottom:24px;margin-top:4px;';
  heading.textContent = `${monthName} ${activeYear}`;
  mc.appendChild(heading);

  // ── INCOME ──
  renderIncomeCard(mc, mi, monthName);
  // ── EXPENSES ──
  renderExpensesCard(mc, mi);
  // ── CHARTS (expenses bar) ──
  renderExpenseChart(mc, mi);
  // ── INVESTMENTS ──
  renderInvestmentsCard(mc, mi);
  // ── INV PIE ──
  renderInvPieChart(mc, mi);
  // ── SAVINGS ──
  renderSavingsCard(mc, mi, monthName);
}

function renderIncomeCard(parent, mi, monthName) {
  const card = createCard('💼 Income', parent);
  INCOME_FIELDS.forEach(f=>{
    const row = document.createElement('div');
    row.className='input-row';
    row.innerHTML=`<label>${f.label}</label>
      <input type="number" min="0" placeholder="₹ 0"
        value="${getVal(activeYear,mi,f.key)||''}"
        id="inc_${f.key}">`;
    card.appendChild(row);
    setTimeout(()=>{
      const inp=document.getElementById(`inc_${f.key}`);
      inp.oninput=()=>{
        save(sk(activeYear,mi,f.key), inp.value);
        updateIncomeSummary(mi, monthName);
        updateSavingsSummary(mi, monthName);
      };
    },0);
  });

function renderInvestmentsCard(parent, mi) {
  const card=createCard('📈 Investments', parent);
  const wrap=document.createElement('div');
  wrap.className='table-wrap';
  const tbl=document.createElement('table');
  tbl.className='inv-table';
  tbl.innerHTML=`<thead><tr>
    <th>Asset Class</th>
    <th>Investment (This Month)</th>
    <th>Market Value (This Month)</th>
    <th>Total Invested (Cumulative)</th>
    <th>Total Market Value (Cumulative)</th>
    <th>Gain / Loss</th>
  </tr></thead><tbody id="inv_tbody_${mi}"></tbody>
  <tfoot><tr>
    <td>TOTAL</td><td></td><td></td>
    <td id="inv_tot_invested_${mi}">—</td>
    <td id="inv_tot_mv_${mi}">—</td>
    <td id="inv_tot_gl_${mi}">—</td>
  </tr></tfoot>`;
  wrap.appendChild(tbl);
  card.appendChild(wrap);

  const tbody=document.getElementById(`inv_tbody_${mi}`);
  INV_ASSETS.forEach((a,ai)=>{
    const tr=document.createElement('tr');
    const amtVal=getVal(activeYear,mi,`inv_${a.key}_amount`)||'';
    const mvVal=getVal(activeYear,mi,`inv_${a.key}_mv`)||'';
    tr.innerHTML=`<td class="asset-name">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${INV_COLORS[ai]};margin-right:8px;"></span>${a.label}</td>
      <td><input type="number" min="0" placeholder="0" value="${amtVal}" id="inv_${a.key}_amt_${mi}"></td>
      <td><input type="number" min="0" placeholder="0" value="${mvVal}" id="inv_${a.key}_mv_${mi}"></td>
      <td class="computed" id="inv_${a.key}_totinv_${mi}">—</td>
      <td class="computed" id="inv_${a.key}_totmv_${mi}">—</td>
      <td id="inv_${a.key}_gl_${mi}">—</td>`;
    tbody.appendChild(tr);
    setTimeout(()=>{
      ['amt','mv'].forEach(t=>{
        const inp=document.getElementById(`inv_${a.key}_${t}_${mi}`);
        inp.oninput=()=>{
          save(sk(activeYear,mi,`inv_${a.key}_${t==='amt'?'amount':'mv'}`), inp.value);
          updateInvRow(mi, a.key, ai);
          updateInvTotals(mi);
          updateSavingsSummary(mi, MONTHS[mi]);
          if(charts[`invPie_${mi}`]) updateInvPieChart(mi);
        };
      });
      updateInvRow(mi, a.key, ai);
    },0);
  });
  updateInvTotals(mi);
}

function updateInvRow(mi, aKey, ai) {
  const {totalInv, totalMV}=calcInvCumulative(activeYear, mi, aKey);
  const gl=totalMV-totalInv;
  const elTI=document.getElementById(`inv_${aKey}_totinv_${mi}`);
  const elTM=document.getElementById(`inv_${aKey}_totmv_${mi}`);
  const elGL=document.getElementById(`inv_${aKey}_gl_${mi}`);
  if(elTI) elTI.textContent=fmt(totalInv);
  if(elTM) elTM.textContent=fmt(totalMV);
  if(elGL){
    elGL.textContent=fmtSigned(gl);
    elGL.className=gl>=0?'gain-pos':'gain-neg';
  }
}

function updateInvTotals(mi) {
  let totInv=0, totMV=0;
  INV_ASSETS.forEach(a=>{
    const {totalInv,totalMV}=calcInvCumulative(activeYear,mi,a.key);
    totInv+=totalInv; totMV+=totalMV;
  });
  const gl=totMV-totInv;
  const eti=document.getElementById(`inv_tot_invested_${mi}`);
  const etm=document.getElementById(`inv_tot_mv_${mi}`);
  const egl=document.getElementById(`inv_tot_gl_${mi}`);
  if(eti) eti.textContent=fmt(totInv);
  if(etm) etm.textContent=fmt(totMV);
  if(egl){
    egl.textContent=fmtSigned(gl);
    egl.style.color=gl>=0?'var(--green)':'var(--red)';
  }
}

function renderSummary() {
  const mc=document.getElementById('mainContent');

  const heading=document.createElement('div');

  };

  profInfo.className='profile-info';
  const nameVal=load(`fd_${activeYear}_name`,'');

  profInfo.innerHTML=`

    <textarea id="prof_bio" placeholder="Short bio about yourself…">${bioVal}</textarea>`;
  profSec.appendChild(picWrap);
  profSec.appendChild(profInfo);
  mc.appendChild(profSec);
  setTimeout(()=>{
    document.getElementById('prof_name').oninput=e=>save(`fd_${activeYear}_name`,e.target.value);

  // Summary Grid

  mc.appendChild(grid);

  goalsCard.className='card goals-box';

  goalsCard.innerHTML=`<div class="card-title"><span class="icon">🎯</span> My Financial Goals — ${activeYear}</div>
    <textarea id="goalsTA" placeholder="Write your financial goals for the year…">${goalsVal}</textarea>`;
  grid.appendChild(goalsCard);
  setTimeout(()=>{
    document.getElementById('goalsTA').oninput=e=>save(`fd_${activeYear}_goals`,e.target.value);
  },0);

  const statsCard=document.createElement('div');
  statsCard.className='card';
  const totalInc=MONTHS.reduce((_,__,i)=>_+calcIncome(activeYear,i),0);
  const totalExp=MONTHS.reduce((_,__,i)=>_+calcExpenses(activeYear,i),0);
  const totalInv=MONTHS.reduce((_,__,i)=>_+calcMonthInvAmount(activeYear,i),0);
  const totalSav=totalInc-totalExp-totalInv;
  statsCard.innerHTML=`<div class="card-title"><span class="icon">📊</span> Year Summary ${activeYear}</div>
    <div class="total-box green" style="margin-bottom:10px"><span>Total Annual Income</span><span class="amount">${fmt(totalInc)}</span></div>
    <div class="total-box red" style="margin-bottom:10px"><span>Total Annual Expenses</span><span class="amount">${fmt(totalExp)}</span></div>
    <div class="total-box blue" style="margin-bottom:10px"><span>Total Annual Investments</span><span class="amount">${fmt(totalInv)}</span></div>
    <div class="total-box gold"><span>Total Annual Savings</span><span class="amount">${fmt(totalSav)}</span></div>`;
  grid.appendChild(statsCard);

  const savChartCard=document.createElement('div');
  savChartCard.className='chart-card-full';
  savChartCard.innerHTML=`<h3>📉 Monthly Savings (${activeYear})</h3><div class="chart-wrap-full"><canvas id="savLine"></canvas></div>`;
  grid.appendChild(savChartCard);

  mvChartCard.className='chart-card-full';
  mvChartCard.innerHTML=`<h3>📈 Portfolio Market Value (${activeYear})</h3><div class="chart-wrap-full"><canvas id="mvLine"></canvas></div>`;
  grid.appendChild(mvChartCard);

  // Render both line charts
  setTimeout(()=>{
    const savData=MONTHS.map((_,i)=>{
      const inc=calcIncome(activeYear,i);
      const exp=calcExpenses(activeYear,i);
      const inv=calcMonthInvAmount(activeYear,i);
      return inc-exp-inv;
    });
    const mvData=MONTHS.map((_,i)=>calcMonthInvTotal(activeYear,i).totalMV);

    const lineDefaults={
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'₹'+ctx.parsed.y.toLocaleString('en-IN')}}},
      scales:{
        x:{ticks:{color:'#8fa3bf'},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{ticks:{color:'#8fa3bf',callback:v=>'₹'+v.toLocaleString('en-IN')},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    };

    charts['savLine']=new Chart(document.getElementById('savLine').getContext('2d'),{
      type:'line',
      data:{labels:MSHORT,datasets:[{label:'Savings',data:savData,borderColor:'#f4c430',backgroundColor:'rgba(244,196,48,0.1)',tension:0.4,fill:true,pointBackgroundColor:'#f4c430',pointRadius:5}]},
      options:lineDefaults
    });
    charts['mvLine']=new Chart(document.getElementById('mvLine').getContext('2d'),{
      type:'line',
      data:{labels:MSHORT,datasets:[{label:'Market Value',data:mvData,borderColor:'#27ae60',backgroundColor:'rgba(39,174,96,0.1)',tension:0.4,fill:true,pointBackgroundColor:'#27ae60',pointRadius:5}]},
      options:lineDefaults
    });
  },50);

  // Vision Board
  const vbCard=document.createElement('div');
  vbCard.className='card';
  vbCard.style.gridColumn='1/-1';
  vbCard.innerHTML=`<div class="card-title"><span class="icon">🌟</span> My Vision Board — ${activeYear}</div>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:16px;">Click any cell to upload your vision images (saved privately in your browser)</p>
    <div class="vision-board" id="visionBoard"></div>`;
  grid.appendChild(vbCard);
  buildVisionBoard();
}

function buildVisionBoard() {
  const board=document.getElementById('visionBoard');
  if(!board) return;
  board.innerHTML='';
  for(let i=0;i<10;i++){
    const cell=document.createElement('div');
    cell.className='vision-cell';
    const img=load(`fd_${activeYear}_vision_${i}`,'');
    if(img){
      cell.innerHTML=`<img src="${img}" alt="Vision ${i+1}"><button class="remove-btn" title="Remove">✕</button>`;
      cell.querySelector('.remove-btn').onclick=(e)=>{
        e.stopPropagation();
        save(`fd_${activeYear}_vision_${i}`,'');
        buildVisionBoard();
      };
    } else {
      cell.innerHTML=`<span class="add-icon">+</span>`;
    }
    cell.onclick=(e)=>{
      if(e.target.classList.contains('remove-btn')) return;
      visionSlot=i;
      const inp=document.getElementById('visionInput');
      inp.onchange=ev=>{
        const f=ev.target.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=ev2=>{
          save(`fd_${activeYear}_vision_${visionSlot}`, ev2.target.result);
          buildVisionBoard();
        };
        r.readAsDataURL(f);
        inp.value='';
      };
      inp.click();
    };
    board.appendChild(cell);
  }
}

function createCard(title, parent) {
  const card=document.createElement('div');
  card.className='card';
  const h=document.createElement('div');
  h.className='card-title';
  const parts=title.split(' ');
  h.innerHTML=`<span class="icon">${parts[0]}</span>${parts.slice(1).join(' ')}`;
  card.appendChild(h);
  parent.appendChild(card);
  return card;
}

  const inc=calcIncome(activeYear,mi);

  let html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${mn} ${activeYear} Report</title>
  <style>body{font-family:sans-serif;padding:32px;max-width:800px;margin:0 auto;}
  h1{color:#0d1b2a;}h2{color:#333;border-bottom:2px solid #f4c430;padding-bottom:8px;}
  table{width:100%;border-collapse:collapse;margin:16px 0;}
  td,th{padding:10px;border:1px solid #ddd;text-align:left;}th{background:#f9f3dc;}
  .total{font-weight:bold;background:#fffbea;}</style></head><body>
  <h1>📊 Financial Report — ${mn} ${activeYear}</h1>
  <h2>Income</h2><table><tr><th>Category</th><th>Amount</th></tr>
  ${INCOME_FIELDS.map(f=>`<tr><td>${f.label}</td><td>${fmt(getVal(activeYear,mi,f.key))}</td></tr>`).join('')}
  <tr class="total"><td>Total Income</td><td>${fmt(inc)}</td></tr></table>
  <h2>Expenses</h2><table><tr><th>Category</th><th>Amount</th></tr>
  ${EXPENSE_FIELDS.map(f=>`<tr><td>${f.label}</td><td>${fmt(getVal(activeYear,mi,f.key))}</td></tr>`).join('')}
  <tr class="total"><td>Total Expenses</td><td>${fmt(exp)}</td></tr></table>
  <h2>Investments (This Month)</h2><table><tr><th>Asset</th><th>Invested</th><th>Market Value</th></tr>
  ${INV_ASSETS.map(a=>`<tr><td>${a.label}</td><td>${fmt(getVal(activeYear,mi,`inv_${a.key}_amount`))}</td><td>${fmt(getVal(activeYear,mi,`inv_${a.key}_mv`))}</td></tr>`).join('')}
  <tr class="total"><td>Total Investments</td><td>${fmt(inv)}</td><td>—</td></tr></table>
  <h2>Net Savings</h2><p style="font-size:1.5rem;color:#27ae60;font-weight:bold;">${fmt(sav)}</p>
  <p>${fmt(inc)} Income − ${fmt(exp)} Expenses − ${fmt(inv)} Investments</p>
  </body></html>`;

  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  w.print();
}
